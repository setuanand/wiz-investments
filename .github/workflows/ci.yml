name: CI

on:
  push:
  pull_request:

jobs:
  lint-theme:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up PHP
        uses: shivammathur/setup-php@v4
        with:
          php-version: 8.3
      - name: Run theme validation tests
        run: bash scripts/test.sh
